<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #F5C842;
      --rose: #E8637A;
      --violet: #9B6FD8;
      --bg: #0D0D14;
      --text: #F0ECE8;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    #background-photo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100%;
      height: 100dvh;
      background-image: url('photo.jpeg');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: var(--bg);
      z-index: 0;
      filter: none;
      transition: filter 2.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #background-photo.revealed {
      filter: none;
    }

    #stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem 1rem 4rem;
      gap: 2.5rem;
      position: relative;
      z-index: 2;
    }

    #sampler {
      display: none;
    }

    /* Point 11: Camera zoom wrapper */
    #mosaic-wrap {
      position: relative;
      display: inline-block;
      max-width: calc(100vw - 2rem);
      border-radius: 4px;
      box-shadow: 0 0 80px rgba(245, 200, 66, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.06);
      transform: scale(1);
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease;
    }

    #mosaic-wrap.zoomed {
      transform: scale(1.04);
    }

    /* Point 4: Perspective */
    #grid {
      display: grid;
      gap: 2px;
      background: transparent;
      perspective: 900px;
      max-width: 100%;
      /* High-end 3D depth */
    }

    /* Point 2, 7, 14: GPU Optimization and Tile defaults */
    .tile {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 2px;
      transform-origin: bottom center;
      opacity: 1;
      z-index: 5;

      /* GPU optimizations */
      transform-style: preserve-3d;
      backface-visibility: hidden;
      contain: layout paint;
      will-change: transform, box-shadow, opacity;
      transform: translateZ(0);
      /* Force hardware accel */
    }

    /* Point 2, 3: Heavy keyframe animation with overshoot and shadow */
    @keyframes dominoFall {
      0% {
        transform: rotateX(0deg) translateY(0) scale(1) translateZ(0);
        box-shadow: 0 0 0 rgba(0, 0, 0, 0);
        opacity: 1;
      }

      75% {
        transform: rotateX(105deg) translateY(30%) scale(0.97) translateZ(0);
        box-shadow: 0 15px 20px rgba(0, 0, 0, 0.4);
        opacity: 0.8;
      }

      90% {
        transform: rotateX(88deg) translateY(38%) scale(0.965) translateZ(0);
        box-shadow: 0 20px 25px rgba(0, 0, 0, 0.35);
        opacity: 0.2;
      }

      100% {
        transform: rotateX(90deg) translateY(40%) scale(0.96) translateZ(0);
        box-shadow: 0 25px 30px rgba(0, 0, 0, 0.35);
        opacity: 0;
      }
    }

    .tile.fallen {
      animation: dominoFall 0.55s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
      pointer-events: none;
    }

    #replay {
      margin-top: 0.5rem;
      padding: 0.6rem 2rem;
      border: 1px solid rgba(245, 200, 66, 0.35);
      background: transparent;
      color: var(--gold);
      border-radius: 99px;
      cursor: pointer;
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.8s ease, background 0.2s, color 0.2s;
    }

    #replay:hover {
      background: var(--gold);
      color: var(--bg);
    }

    #replay.visible {
      opacity: 1;
    }

    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #tearable-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      cursor: crosshair;
      transition: opacity 0.8s ease;
    }

    #tearable-canvas.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <canvas id="confetti"></canvas>
  <canvas id="sampler"></canvas>
  <canvas id="tearable-canvas"></canvas>

  <div id="background-photo"></div>

  <div id="stage" style="display:none">
    <div id="mosaic-wrap">
      <div id="grid"></div>
    </div>

    <img id="photo" src="bday.webp" style="display:none" alt="birthday photo">
    <button id="replay">↺ &nbsp;Replay</button>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    //  AUDIO SYSTEM (Point 13) - Web Audio Synths
    // ═══════════════════════════════════════════════════
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let actx = null;

    function initAudio() {
      if (!actx) {
        actx = new AudioContext();
      }
      if (actx.state === 'suspended') actx.resume();
    }

    function playTick() {
      if (!actx) return;
      const now = actx.currentTime;
      const osc = actx.createOscillator();
      const gain = actx.createGain();

      osc.type = 'triangle';
      // Slight pitch variation for realism
      osc.frequency.setValueAtTime(700 + Math.random() * 200, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.03);

      gain.gain.setValueAtTime(0.08, now); // soft tick
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);

      osc.connect(gain);
      gain.connect(actx.destination);
      osc.start(now);
      osc.stop(now + 0.04);
    }

    function playWhoosh() {
      if (!actx) return;
      const now = actx.currentTime;
      const length = actx.sampleRate * 0.8;
      const buffer = actx.createBuffer(1, length, actx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i++) data[i] = Math.random() * 2 - 1;

      const noise = actx.createBufferSource();
      noise.buffer = buffer;

      const filter = actx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(200, now);
      filter.frequency.exponentialRampToValueAtTime(2000, now + 0.4);
      filter.frequency.exponentialRampToValueAtTime(100, now + 0.8);

      const gain = actx.createGain();
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.15, now + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);

      noise.connect(filter); filter.connect(gain); gain.connect(actx.destination);
      noise.start(now); noise.stop(now + 0.8);
    }

    function playPop() {
      if (!actx) return;
      const now = actx.currentTime;
      const osc = actx.createOscillator();
      const gain = actx.createGain();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);

      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);

      osc.connect(gain); gain.connect(actx.destination);
      osc.start(now); osc.stop(now + 0.2);
    }

    window.addEventListener('mousedown', initAudio, { once: true });
    window.addEventListener('touchstart', initAudio, { once: true });

    // ═══════════════════════════════════════════════════
    //  DOMINO LOGIC
    // ═══════════════════════════════════════════════════
    const COLS = 30, ROWS = 30, BASE_TILE_PX = 19, GRID_GAP = 2;
    const JEWELS = ['#E8637A', '#F5C842', '#9B6FD8', '#4ECDC4', '#F08A5D', '#6BCB77', '#F7B2BD', '#AEE6FF'];
    const grid = document.getElementById('grid');
    const wrap = document.getElementById('mosaic-wrap');
    const replayBtn = document.getElementById('replay');

    // Size the grid correctly
    function updateGridSize() {
      const maxWidth = window.innerWidth - 32;
      const maxHeight = window.innerHeight - 180;
      const available = Math.max(260, Math.min(maxWidth, maxHeight));
      const tilePx = Math.min(BASE_TILE_PX, Math.floor((available - (COLS - 1) * GRID_GAP) / COLS));
      const gridSize = COLS * tilePx + (COLS - 1) * GRID_GAP;

      grid.style.gridTemplateColumns = `repeat(${COLS}, ${tilePx}px)`;
      grid.style.gridTemplateRows = `repeat(${ROWS}, ${tilePx}px)`;
      grid.style.width = gridSize + 'px';
      grid.style.height = gridSize + 'px';
    }

    updateGridSize();
    grid.style.display = 'none';

    const tiles = [];
    for (let r = 0; r < ROWS; r++) {
      tiles[r] = [];
      for (let c = 0; c < COLS; c++) {
        const t = document.createElement('div');
        t.className = 'tile';
        const i = r * COLS + c;
        t.style.background = JEWELS[i % JEWELS.length];
        t.dataset.r = r; t.dataset.c = c;
        grid.appendChild(t);
        tiles[r][c] = t;
      }
    }

    // Assign colors from image
    const sampler = document.getElementById('sampler');
    const ctx = sampler.getContext('2d');
    const photo = document.getElementById('photo');

    function applyImageColors() {
      if (!photo.complete || !photo.naturalWidth) return;
      sampler.width = COLS; sampler.height = ROWS;
      ctx.drawImage(photo, 0, 0, COLS, ROWS);
      const data = ctx.getImageData(0, 0, COLS, ROWS).data;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const i = (r * COLS + c) * 4;
          tiles[r][c].style.background = `rgb(${data[i]},${data[i + 1]},${data[i + 2]})`;
          // Attach wave triggering logic directly to tiles for manual play
          tiles[r][c].onclick = (e) => {
            e.stopPropagation();
            startWave(r, c);
          };
        }
      }
    }
    photo.onload = applyImageColors;
    if (photo.complete) applyImageColors();

    let waveActive = false;
    let waveFallenCount = 0;

    function resetGrid() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const t = tiles[r][c];
          t.style.animation = 'none';
          t.classList.remove('fallen');
          t.getBoundingClientRect(); // force reflow
          t.style.animation = '';
        }
      }
      document.getElementById('background-photo').classList.remove('revealed');
      replayBtn.classList.remove('visible');
      waveActive = false;
      waveFallenCount = 0;
    }

    // Point 1, 5, 6, 15: Natural Manhattan distance propagation with requestAnimationFrame
    function startWave(startR, startC) {
      if (waveActive) return;
      waveActive = true;
      initAudio();

      const totalTiles = ROWS * COLS;
      let activeFrontiers = [{ r: startR, c: startC, time: performance.now() }];
      const visited = new Set([`${startR}-${startC}`]);

      // Unhide grid for animation
      grid.style.display = 'grid';

      // Animate background revealing during falling (Point 12)
      document.getElementById('background-photo').classList.add('revealed');
      playWhoosh(); // cinematic start

      function processWave(currentTime) {
        let newFrontiers = [];
        let fallsThisFrame = 0;

        activeFrontiers.forEach(front => {
          if (currentTime >= front.time) {
            const t = tiles[front.r][front.c];
            t.classList.add('fallen');
            fallsThisFrame++;
            waveFallenCount++;

            // Propagate to neighbors
            const neighbors = [
              [0, 1], [1, 0], [0, -1], [-1, 0]
            ];
            neighbors.forEach(([dr, dc]) => {
              const nr = front.r + dr, nc = front.c + dc;
              if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                const key = `${nr}-${nc}`;
                if (!visited.has(key)) {
                  visited.add(key);
                  // Point 6: Random timing added to wave speed (approx 22-32ms base)
                  const delay = 35 + Math.random() * 15;
                  newFrontiers.push({ r: nr, c: nc, time: currentTime + delay });
                }
              }
            });
          } else {
            newFrontiers.push(front); // still waiting
          }
        });

        // Limit tick sound frequency so it doesn't clip audio context
        if (fallsThisFrame > 0 && Math.random() > 0.4) {
          playTick();
        }

        activeFrontiers = newFrontiers;

        if (activeFrontiers.length > 0) {
          requestAnimationFrame(processWave);
        } else {
          // Point 8: When all tiles fall, trigger finale
          setTimeout(() => {
            setTimeout(() => {
              launchConfetti();
              playPop();
            }, 300);
            setTimeout(() => { replayBtn.classList.add('visible'); }, 1500);
            setTimeout(() => { grid.style.display = 'none'; }, 2200);
          }, 300); // Wait for last tile animation to nearly finish
        }
      }

      requestAnimationFrame(processWave);
    }

    replayBtn.addEventListener('click', () => {
      // Re-enable scratch setup
      resetGrid();
      grid.style.display = 'none';
      wrap.classList.remove('zoomed');

      // Reset tearable logic
      scratchComplete = false;
      initTearableCloth();
      tearableCanvas.classList.remove('hidden');
    });

    // ═══════════════════════════════════════════════════
    //  TEARABLE CLOTH EFFECT — PREMIUM MASK BRUSH (Points 9, 10, 11)
    // ═══════════════════════════════════════════════════
    const tearableCanvas = document.getElementById('tearable-canvas');
    const tearCtx = tearableCanvas.getContext('2d', { willReadFrequently: true });

    // We use an offscreen canvas to accumulate the scratched path smoothly
    const maskCanvas = document.createElement('canvas');
    const maskCtx = maskCanvas.getContext('2d');

    const BRUSH_SIZE = 45;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    let isDrawing = false;
    let lx = 0, ly = 0;
    let scratchComplete = false;

    const bdayImg = new Image();
    bdayImg.src = 'bday.webp';
    let bdayLoaded = false;
    bdayImg.onload = () => { bdayLoaded = true; drawTearFrame(); };

    function resizeCanvas(canvas, context, width, height) {
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      canvas.width = Math.round(width * DPR);
      canvas.height = Math.round(height * DPR);
      context.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    function getViewportSize() {
      const viewport = window.visualViewport;
      return {
        width: Math.floor(viewport?.width || window.innerWidth),
        height: Math.floor(viewport?.height || window.innerHeight)
      };
    }

    function initTearableCloth() {
      const { width: w, height: h } = getViewportSize();
      resizeCanvas(tearableCanvas, tearCtx, w, h);
      resizeCanvas(maskCanvas, maskCtx, w, h);

      // Fill the mask completely black (opaque)
      maskCtx.fillStyle = '#000';
      maskCtx.fillRect(0, 0, w, h);

      if (bdayLoaded) drawTearFrame();
    }

    // Check how much is scratched by sampling low-res grid of pixels
    function checkScratchProgress() {
      const w = maskCanvas.width, h = maskCanvas.height;
      const imgData = maskCtx.getImageData(0, 0, w, h).data;
      let clearCount = 0;
      let totalSamples = 0;

      // Sample 1 out of every 1024 pixels (approx 32x32 step)
      for (let i = 3; i < imgData.length; i += 4096) {
        totalSamples++;
        if (imgData[i] === 0) clearCount++;
      }

      if ((clearCount / totalSamples) > 0.45 && !scratchComplete) {
        // Point 11: Camera zoom and transition!
        scratchComplete = true;
        wrap.classList.add('zoomed'); // Triggers scale(1) -> scale(1.04) transition

        setTimeout(() => {
          tearableCanvas.classList.add('hidden');
          grid.style.display = 'none';
        }, 800); // wait for 800ms zoom transition
      }
    }

    function drawRoughLine(x, y, isDown) {
      if (scratchComplete) return;
      if (!isDown) {
        lx = x; ly = y;
        isDrawing = true;
        return;
      }

      // Erase on the mask (destination-out makes pixels transparent)
      maskCtx.globalCompositeOperation = 'destination-out';

      const dist = Math.hypot(x - lx, y - ly);
      const steps = Math.ceil(dist / 4);

      for (let i = 0; i <= steps; i++) {
        const t = steps === 0 ? 0 : i / steps;
        const cx = lx + (x - lx) * t;
        const cy = ly + (y - ly) * t;

        // Soft circular brush
        const gradient = maskCtx.createRadialGradient(cx, cy, BRUSH_SIZE * 0.2, cx, cy, BRUSH_SIZE);
        gradient.addColorStop(0, 'rgba(0,0,0,1)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');

        maskCtx.fillStyle = gradient;
        maskCtx.beginPath();
        maskCtx.arc(cx, cy, BRUSH_SIZE, 0, Math.PI * 2);
        maskCtx.fill();

        // Point 10: Ripped paper fibers mapping on edges
        if (Math.random() > 0.6) {
          const angle = Math.random() * Math.PI * 2;
          const rOffset = BRUSH_SIZE * (0.8 + Math.random() * 0.4);
          maskCtx.fillStyle = 'rgba(0,0,0,0.85)';
          maskCtx.beginPath();
          maskCtx.arc(cx + Math.cos(angle) * rOffset, cy + Math.sin(angle) * rOffset, 2 + Math.random() * 3, 0, Math.PI * 2);
          maskCtx.fill();
        }
      }

      maskCtx.globalCompositeOperation = 'source-over';
      lx = x; ly = y;
      requestAnimationFrame(drawTearFrame);

      // Debounce the progress check
      if (Math.random() > 0.9) checkScratchProgress();
    }

    function drawTearFrame() {
      if (!bdayLoaded || scratchComplete) return;
      const { width: viewportWidth, height: viewportHeight } = getViewportSize();
      const cw = Math.min(tearableCanvas.clientWidth || viewportWidth, viewportWidth);
      const ch = Math.min(tearableCanvas.clientHeight || viewportHeight, viewportHeight);
      tearCtx.clearRect(0, 0, cw, ch);

      // We want to draw bday.webp over the whole screen, but only where maskCanvas is opaque.
      // Additionally, we want the scratched edge to have a tiny drop shadow 
      // (as if the torn cloth has thickness).

      // Keep the birthday image fully visible on every screen size.
      const margin = 4;
      const availableWidth = Math.max(1, cw - margin * 2);
      const availableHeight = Math.max(1, ch - margin * 2);
      const scale = Math.min(availableWidth / bdayImg.width, availableHeight / bdayImg.height);
      const dw = bdayImg.width * scale, dh = bdayImg.height * scale;
      const dx = (cw - dw) / 2, dy = (ch - dh) / 2;

      // 1. Draw the beautiful shadow of the torn edge!
      tearCtx.save();
      tearCtx.shadowColor = 'rgba(0,0,0,0.8)';
      tearCtx.shadowBlur = 12;
      tearCtx.shadowOffsetX = 2;
      tearCtx.shadowOffsetY = 4;
      // Drawing the mask itself will render its solid parts, plus drop shadows into the transparent torn holes!
      tearCtx.drawImage(maskCanvas, 0, 0, cw, ch);
      tearCtx.restore();

      // 2. We now replace the black mask color with the bday.webp image
      tearCtx.globalCompositeOperation = 'source-atop';
      tearCtx.fillStyle = '#0D0D14';
      tearCtx.fillRect(0, 0, cw, ch);
      tearCtx.drawImage(bdayImg, dx, dy, dw, dh);

      // 3. Reset blending
      tearCtx.globalCompositeOperation = 'source-over';
    }

    // Input handling
    tearableCanvas.addEventListener('mousedown', (e) => drawRoughLine(e.clientX, e.clientY, false));
    tearableCanvas.addEventListener('mousemove', (e) => {
      if (isDrawing) drawRoughLine(e.clientX, e.clientY, true);
    });
    window.addEventListener('mouseup', () => isDrawing = false);

    // Touch
    tearableCanvas.addEventListener('touchstart', (e) => {
      drawRoughLine(e.touches[0].clientX, e.touches[0].clientY, false);
      initAudio();
    });
    tearableCanvas.addEventListener('touchmove', (e) => {
      if (isDrawing) { e.preventDefault(); drawRoughLine(e.touches[0].clientX, e.touches[0].clientY, true); }
    }, { passive: false });
    window.addEventListener('touchend', () => isDrawing = false);

    window.addEventListener('resize', () => {
      if (!scratchComplete) initTearableCloth();
      updateGridSize();
      const { width: w, height: h } = getViewportSize();
      cc.width = w; cc.height = h;
    });

    // ═══════════════════════════════════════════════════
    //  CONFETTI & INITIALIZATION
    // ═══════════════════════════════════════════════════
    const cc = document.getElementById('confetti');
    const ccx = cc.getContext('2d');
    let pieces = [];
    let confettiRaf;

    function launchConfetti() {
      cc.width = window.innerWidth; cc.height = window.innerHeight;
      pieces = [];
      const colors = ['#F5C842', '#E8637A', '#9B6FD8', '#4ECDC4', '#F08A5D', '#6BCB77', '#fff'];
      for (let i = 0; i < 180; i++) {
        pieces.push({
          x: Math.random() * cc.width, y: -20 - Math.random() * 200,
          r: 3 + Math.random() * 5, d: 1.5 + Math.random() * 2.5,
          c: colors[Math.floor(Math.random() * colors.length)],
          t: Math.random() * Math.PI * 2, s: (Math.random() - 0.5) * 1.5, o: 1,
        });
      }
      cancelAnimationFrame(confettiRaf);
      tickConfetti();
    }

    function tickConfetti() {
      ccx.clearRect(0, 0, cc.width, cc.height);
      let alive = false;
      pieces.forEach(p => {
        p.y += p.d; p.x += p.s; p.t += 0.04; p.o -= 0.003;
        if (p.o < 0) p.o = 0;
        if (p.y < cc.height + 20) alive = true;
        ccx.save(); ccx.globalAlpha = p.o;
        ccx.translate(p.x, p.y); ccx.rotate(p.t);
        ccx.fillStyle = p.c; ccx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
        ccx.restore();
      });
      if (alive) confettiRaf = requestAnimationFrame(tickConfetti);
      else ccx.clearRect(0, 0, cc.width, cc.height);
    }

    // Startup
    document.getElementById('stage').style.display = 'flex';
    initTearableCloth();
  </script>
</body>

</html>
