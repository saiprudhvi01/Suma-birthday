<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joyfull Birthday!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0010;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* Photo revealed behind the cloth */
    #photo-bg {
      position: absolute;
      inset: 0;
      background: url('photo.jpeg') center/cover no-repeat;
      z-index: 0;
    }

    /* Cloth canvas sits on top */
    #cloth-canvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      cursor: crosshair;
      touch-action: none;
    }

    /* Confetti above everything */
    #confetti-canvas {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    #hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      background: rgba(0,0,0,0.45);
      padding: 7px 18px;
      border-radius: 30px;
      letter-spacing: 0.06em;
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #next-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: clamp(18px, 4vw, 32px);
      background: rgba(0, 0, 0, 0.65);
      padding: 16px 26px;
      border-radius: 40px;
      letter-spacing: 0.08em;
      text-align: center;
      z-index: 6;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #next-hint.visible {
      opacity: 1;
    }

    #replay {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 7px 20px;
      border: 1px solid rgba(245, 200, 66, 0.5);
      background: transparent;
      color: #F5C842;
      border-radius: 30px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.8s ease, background 0.2s;
      z-index: 5;
    }
    #replay:hover { background: rgba(245,200,66,0.15); }
    #replay.visible { opacity: 1; }

    #next-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 10px 24px;
      border: 1px solid rgba(245, 200, 66, 0.5);
      background: transparent;
      color: #F5C842;
      border-radius: 30px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.8s ease, background 0.2s;
      z-index: 5;
      pointer-events: none;
    }
    #next-btn:hover { background: rgba(245,200,66,0.15); }
    #next-btn.visible { opacity: 1; pointer-events: auto; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      45% { opacity: 0.85; }
      50% { opacity: 0.6; }
      55% { opacity: 0.9; }
    }

    #cake-container {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transform: translateY(80px);
      transition: opacity 1.2s ease, transform 1.2s ease;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
    }
    #cake-container.visible {
      opacity: 1; pointer-events: auto;
      transform: translateY(0);
    }
    #cake-emoji {
      font-size: 100px;
      animation: pulse 2s infinite ease-in-out, flicker 1.8s infinite ease-in-out;
      filter: drop-shadow(0 0 18px rgba(255,200,80,0.7));
    }
    #cake-candles {
      margin-top: 16px;
      font-size: 34px;
      letter-spacing: 0.18em;
      animation: flicker 1.8s infinite ease-in-out;
    }
    #cake-title {
      color: #fff;
      font-family: 'Georgia', serif;
      margin-top: 20px;
      font-size: clamp(22px, 5vw, 36px);
      text-shadow: 0 0 18px rgba(255,180,60,0.8), 0 2px 8px rgba(0,0,0,0.6);
      letter-spacing: 0.04em;
    }
    #cut-cake,
    #blow-candles {
      margin-top: 30px;
      padding: 12px 30px;
      cursor: pointer;
      background: #F5C842;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      font-size: 16px;
      letter-spacing: 0.06em;
      box-shadow: 0 0 20px rgba(245,200,66,0.6);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #blow-candles:hover { transform: scale(1.06); box-shadow: 0 0 30px rgba(245,200,66,0.9); }
    #wish-msg {
      color: #F5C842;
      font-family: 'Georgia', serif;
      font-size: clamp(28px, 7vw, 56px);
      text-align: center;
      text-shadow: 0 0 24px rgba(245,200,66,0.8), 0 2px 10px rgba(0,0,0,0.7);
      animation: pulse 1.6s infinite ease-in-out;
      padding: 0 20px;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="photo-bg"></div>
  <canvas id="cloth-canvas"></canvas>
  <canvas id="confetti-canvas"></canvas>
  <div id="hint">✦ Grab &amp; tear the cloth</div>
  <div id="next-hint">Click <strong>Next</strong> to continue</div>
  <button id="replay">↺ Replay</button>
  <button id="next-btn">Next →</button>
  <div id="cake-container">
    <div id="cake-emoji">🎂</div>
    <h2 id="cake-title">Make a Wish!</h2>
    <button id="blow-candles">🕯️ Blow out the candles</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  SONG
// ─────────────────────────────────────────────
const birthdaySong = new Audio('song.mp3');
birthdaySong.preload = 'auto';
birthdaySong.loop = false;
birthdaySong.volume = 0.8;
birthdaySong.crossOrigin = 'anonymous';

function playBirthdaySong() {
  try {
    birthdaySong.currentTime = 0;
    birthdaySong.muted = false;
    const playPromise = birthdaySong.play();
    
    if (playPromise && typeof playPromise.catch === 'function') {
      playPromise.catch((err) => {
        console.log('Audio play failed, retrying with click handler:', err);
        // Fallback: try again on next user interaction
        const retryPlay = () => {
          birthdaySong.play().catch(() => {});
          document.removeEventListener('click', retryPlay);
          document.removeEventListener('touchstart', retryPlay);
        };
        document.addEventListener('click', retryPlay, { once: true });
        document.addEventListener('touchstart', retryPlay, { once: true });
      });
    }
  } catch (e) {
    console.log('Audio play exception:', e);
  }
}

// ─────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────
const canvas   = document.getElementById('cloth-canvas');
const ctx      = canvas.getContext('2d');
const confCvs  = document.getElementById('confetti-canvas');
const confCtx  = confCvs.getContext('2d');
const app      = document.getElementById('app');
const hint     = document.getElementById('hint');
const nextHint = document.getElementById('next-hint');
const replayBtn= document.getElementById('replay');
const nextBtn  = document.getElementById('next-btn');

let W, H;

// Cloth grid resolution — more cols = smoother but heavier
const COLS = 40;
const ROWS = 30;
let SX, SY; // spacing x / y

// Physics constants
const GRAVITY        = 0.5;
const DAMPING        = 0.988;
const ITERATIONS     = 8;
const TEAR_DIST_MULT = 2.6;
const IS_MOBILE      = window.matchMedia('(pointer: coarse)').matches;
const MOUSE_RADIUS   = IS_MOBILE ? 56 : 80;
const MOUSE_CUT_RADIUS = IS_MOBILE ? 36 : 55;
const MOUSE_CUT_SPEED  = IS_MOBILE ? 2.0 : 4.0;
const AUTO_REVEAL_DELAY_MS = 5000;

let pts  = [];
let segs = [];

// Cloth image
const clothImg = new Image();
clothImg.src = 'bday.webp';
let clothImgReady = false;
clothImg.onload = () => { clothImgReady = true; };

// Off-screen canvas
const sampler = document.createElement('canvas');
const sampCtx = sampler.getContext('2d');

// Mouse/touch state
const mouse = { x: -9999, y: -9999, px: -9999, py: -9999, down: false };

// Confetti
let confPieces = [];
let confRaf;
let revealDone = false;
let autoRevealTimer = null;

// ─────────────────────────────────────────────
//  PAPER TEAR SOUND ENGINE
// ─────────────────────────────────────────────
let audioCtx = null;
let tearSoundActive = false;
let tearIntensityTimer = null;
let lastTornCount = 0;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTearCrackle(intensity) {
  const ac = getAudioCtx();
  const duration = 0.04 + Math.random() * 0.05;
  const sr = ac.sampleRate;
  const frameCount = Math.ceil(sr * duration);

  const bufWhite = ac.createBuffer(1, frameCount, sr);
  const dWhite = bufWhite.getChannelData(0);
  for (let i = 0; i < frameCount; i++) dWhite[i] = Math.random() * 2 - 1;

  const bufPink = ac.createBuffer(1, frameCount, sr);
  const dPink = bufPink.getChannelData(0);
  let b0 = 0, b1 = 0, b2 = 0;
  for (let i = 0; i < frameCount; i++) {
    const wh = Math.random() * 2 - 1;
    b0 = 0.99886 * b0 + wh * 0.0555179;
    b1 = 0.99332 * b1 + wh * 0.0750759;
    b2 = 0.96900 * b2 + wh * 0.1538520;
    dPink[i] = (b0 + b1 + b2 + wh * 0.5362) * 0.11;
  }

  const now = ac.currentTime;
  const masterGain = ac.createGain();
  masterGain.gain.setValueAtTime(0, now);
  masterGain.gain.linearRampToValueAtTime(intensity * 0.9, now + 0.008);
  masterGain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  masterGain.connect(ac.destination);

  const srcW = ac.createBufferSource();
  srcW.buffer = bufWhite;
  const bpW = ac.createBiquadFilter();
  bpW.type = 'bandpass';
  bpW.frequency.value = 2800 + (Math.random() - 0.5) * 600;
  bpW.Q.value = 0.8;
  srcW.connect(bpW);
  bpW.connect(masterGain);
  srcW.start(now);

  const srcW2 = ac.createBufferSource();
  srcW2.buffer = bufWhite;
  const bpW2 = ac.createBiquadFilter();
  bpW2.type = 'bandpass';
  bpW2.frequency.value = 5000 + (Math.random() - 0.5) * 800;
  bpW2.Q.value = 1.2;
  const gainW2 = ac.createGain();
  gainW2.gain.value = 0.55;
  srcW2.connect(bpW2);
  bpW2.connect(gainW2);
  gainW2.connect(masterGain);
  srcW2.start(now);

  const srcP = ac.createBufferSource();
  srcP.buffer = bufPink;
  const lpP = ac.createBiquadFilter();
  lpP.type = 'lowpass';
  lpP.frequency.value = 1200;
  const gainP = ac.createGain();
  gainP.gain.value = 0.4;
  srcP.connect(lpP);
  lpP.connect(gainP);
  gainP.connect(masterGain);
  srcP.start(now);
}

function startTearSound() {
  if (tearSoundActive) return;
  tearSoundActive = true;
  function burst() {
    if (!tearSoundActive) return;
    playTearCrackle(0.35 + Math.random() * 0.35);
    tearIntensityTimer = setTimeout(burst, 18 + Math.random() * 27);
  }
  burst();
}

function stopTearSound() {
  tearSoundActive = false;
  clearTimeout(tearIntensityTimer);
}

function resetTearCount() {
  lastTornCount = 0;
}

// ─────────────────────────────────────────────
//  INIT CLOTH
// ─────────────────────────────────────────────
function initCloth() {
  pts = [];
  segs = [];
  revealDone = false;
  clearAutoRevealTimer();
  replayBtn.classList.remove('visible');
  nextBtn.classList.remove('visible');
  nextHint.classList.remove('visible');
  hint.innerText = '✦ Grab & tear the cloth';
  hint.style.opacity = '1';

  sampler.width  = W;
  sampler.height = H;
  if (clothImgReady) {
    sampCtx.drawImage(clothImg, 0, 0, W, H);
  } else {
    const grad = sampCtx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0,   '#7b2d8b');
    grad.addColorStop(0.5, '#c0392b');
    grad.addColorStop(1,   '#e67e22');
    sampCtx.fillStyle = grad;
    sampCtx.fillRect(0, 0, W, H);
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * SX;
      const y = r * SY;
      pts.push({
        x, y, px: x, py: y,
        pinned: r === 0,
        u: x, v: y,
      });
    }
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const i = r * COLS + c;
      segs.push({ a: pts[i], b: pts[i + 1], len: SX, torn: false });
    }
  }
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS; c++) {
      const i = r * COLS + c;
      segs.push({ a: pts[i], b: pts[i + COLS], len: SY, torn: false });
    }
  }
}

// ─────────────────────────────────────────────
//  PHYSICS UPDATE
// ─────────────────────────────────────────────
function update() {
  const mdx = mouse.x - mouse.px;
  const mdy = mouse.y - mouse.py;
  const mspeed = Math.hypot(mdx, mdy);

  for (const p of pts) {
    if (p.pinned) continue;
    const vx = (p.x - p.px) * DAMPING;
    const vy = (p.y - p.py) * DAMPING;
    p.px = p.x;
    p.py = p.y;
    p.x += vx;
    p.y += vy + GRAVITY;
    if (p.y > H + 60) { p.y = H + 60; }

    if (mouse.down) {
      const dx = p.x - mouse.x;
      const dy = p.y - mouse.y;
      const dist = Math.hypot(dx, dy);
      if (dist < MOUSE_RADIUS) {
        const f = (1 - dist / MOUSE_RADIUS);
        p.x += mdx * f * 0.5;
        p.y += mdy * f * 0.5;
      }
    }
  }

  for (let iter = 0; iter < ITERATIONS; iter++) {
    for (const s of segs) {
      if (s.torn) continue;
      const dx = s.b.x - s.a.x;
      const dy = s.b.y - s.a.y;
      const dist = Math.hypot(dx, dy) || 0.001;
      const diff = (dist - s.len) / dist * 0.5;
      const ox = dx * diff;
      const oy = dy * diff;
      if (!s.a.pinned) { s.a.x += ox; s.a.y += oy; }
      if (!s.b.pinned) { s.b.x -= ox; s.b.y -= oy; }
      if (dist > s.len * TEAR_DIST_MULT) {
        s.torn = true;
      }
    }
  }

  if (mouse.down && mspeed > MOUSE_CUT_SPEED) {
    for (const s of segs) {
      if (s.torn) continue;
      const mx = (s.a.x + s.b.x) * 0.5;
      const my = (s.a.y + s.b.y) * 0.5;
      if (Math.hypot(mx - mouse.x, my - mouse.y) < MOUSE_CUT_RADIUS) {
        s.torn = true;
      }
    }
  }

  mouse.px = mouse.x;
  mouse.py = mouse.y;

  if (mouse.down) {
    const currentTorn = segs.filter(s => s.torn).length;
    if (currentTorn > lastTornCount) {
      startTearSound();
      lastTornCount = currentTorn;
    }
  }

  if (!revealDone) {
    const tornCount = segs.filter(s => s.torn).length;
    if (tornCount > 0 && !autoRevealTimer) {
      hint.innerText = 'Nice! Taking you to the celebration...';
      autoRevealTimer = setTimeout(goToCelebration, AUTO_REVEAL_DELAY_MS);
    }
  }
}

function clearAutoRevealTimer() {
  if (autoRevealTimer) {
    clearTimeout(autoRevealTimer);
    autoRevealTimer = null;
  }
}

function goToCelebration() {
  if (revealDone) return;
  revealDone = true;
  clearAutoRevealTimer();
  hint.style.opacity = '0';
  canvas.style.pointerEvents = 'none';
  playBirthdaySong();
  // Store the current playback time so celebration page continues from same point
  sessionStorage.setItem('birthdaySongTime', birthdaySong.currentTime.toString());
  setTimeout(() => {
    window.location.href = 'celebration.html';
  }, 400);
}

// ─────────────────────────────────────────────
//  TEXTURED TRIANGLE
// ─────────────────────────────────────────────
function drawTexturedTriangle(ctx, img, x0,y0,u0,v0, x1,y1,u1,v1, x2,y2,u2,v2) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.closePath();
  ctx.clip();

  const denom = (u0*(v1-v2) + u1*(v2-v0) + u2*(v0-v1));
  if (Math.abs(denom) < 0.0001) { ctx.restore(); return; }

  const a = ((x0*(v1-v2) + x1*(v2-v0) + x2*(v0-v1)) / denom);
  const b = ((y0*(v1-v2) + y1*(v2-v0) + y2*(v0-v1)) / denom);
  const c = ((x0*(u2-u1) + x1*(u0-u2) + x2*(u1-u0)) / denom);
  const d = ((y0*(u2-u1) + y1*(u0-u2) + y2*(u1-u0)) / denom);
  const e = ((x0*(u1*v2-u2*v1) + x1*(u2*v0-u0*v2) + x2*(u0*v1-u1*v0)) / denom);
  const f = ((y0*(u1*v2-u2*v1) + y1*(u2*v0-u0*v2) + y2*(u0*v1-u1*v0)) / denom);

  ctx.transform(a, b, c, d, e, f);
  ctx.drawImage(img, 0, 0);
  ctx.restore();
}

// ─────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  const tornH = new Set();
  const tornV = new Set();

  for (const s of segs) {
    if (!s.torn) continue;
    const ia = pts.indexOf(s.a);
    const ib = pts.indexOf(s.b);
    if (ib === ia + 1) tornH.add(ia);
    else if (ib === ia + COLS) tornV.add(ia);
  }

  ctx.shadowBlur = 0;
  for (let r = 0; r < ROWS - 1; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const i  = r * COLS + c;
      const p0 = pts[i];
      const p1 = pts[i + 1];
      const p2 = pts[i + COLS];
      const p3 = pts[i + COLS + 1];

      if (tornH.has(i) || tornH.has(i + COLS) || tornV.has(i) || tornV.has(i + 1)) continue;

      drawTexturedTriangle(ctx, sampler,
        p0.x, p0.y, p0.u, p0.v,
        p1.x, p1.y, p1.u, p1.v,
        p3.x, p3.y, p3.u, p3.v
      );
      drawTexturedTriangle(ctx, sampler,
        p0.x, p0.y, p0.u, p0.v,
        p3.x, p3.y, p3.u, p3.v,
        p2.x, p2.y, p2.u, p2.v
      );
    }
  }
}

// ─────────────────────────────────────────────
//  CONFETTI
// ─────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#F5C842','#E8637A','#9B6FD8','#4ECDC4','#F08A5D','#6BCB77','#fff'];
  confPieces = Array.from({ length: 160 }, () => ({
    x: Math.random() * W, y: -20 - Math.random() * 180,
    r: 3 + Math.random() * 5, d: 1.4 + Math.random() * 2.5,
    c: colors[Math.floor(Math.random() * colors.length)],
    t: Math.random() * Math.PI * 2, s: (Math.random() - 0.5) * 1.8, o: 1,
  }));
  cancelAnimationFrame(confRaf);
  tickConfetti();
}

function tickConfetti() {
  confCtx.clearRect(0, 0, W, H);
  let alive = false;
  for (const p of confPieces) {
    p.y += p.d; p.x += p.s; p.t += 0.04; p.o -= 0.0035;
    if (p.o <= 0) p.o = 0;
    if (p.y < H + 20) alive = true;
    confCtx.save();
    confCtx.globalAlpha = p.o;
    confCtx.translate(p.x, p.y);
    confCtx.rotate(p.t);
    confCtx.fillStyle = p.c;
    confCtx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
    confCtx.restore();
  }
  if (alive) confRaf = requestAnimationFrame(tickConfetti);
}

// ─────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────
//  RESIZE
// ─────────────────────────────────────────────
function resize() {
  W = app.clientWidth;
  H = app.clientHeight;
  canvas.width  = W; canvas.height  = H;
  confCvs.width = W; confCvs.height = H;
  SX = W / (COLS - 1);
  SY = H / (ROWS - 1);
  initCloth();
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
function getXY(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  const p = getXY(e);
  mouse.x = p.x; mouse.y = p.y; mouse.px = p.x; mouse.py = p.y;
  hint.style.opacity = '0';
  getAudioCtx();
  birthdaySong.play().catch(() => {});
});
canvas.addEventListener('mousemove', e => {
  if (!mouse.down) return;
  mouse.px = mouse.x; mouse.py = mouse.y;
  const p = getXY(e); mouse.x = p.x; mouse.y = p.y;
});
window.addEventListener('mouseup', () => {
  mouse.down = false;
  stopTearSound();
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  mouse.down = true;
  const p = getXY(e);
  mouse.x = p.x; mouse.y = p.y; mouse.px = p.x; mouse.py = p.y;
  hint.style.opacity = '0';
  getAudioCtx();
  birthdaySong.play().catch(() => {});
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!mouse.down) return;
  mouse.px = mouse.x; mouse.py = mouse.y;
  const p = getXY(e); mouse.x = p.x; mouse.y = p.y;
}, { passive: false });
window.addEventListener('touchend', () => {
  mouse.down = false;
  stopTearSound();
});

function showCakeScene() {
  const cc = document.getElementById('cake-container');
  cc.innerHTML = `
    <div id="cake-stage">
      <div id="cake-emoji">🎂</div>
      <div id="cake-candles">🕯️🕯️🕯️🕯️🕯️</div>
      <h2 id="cake-title">Make a wish and cut the cake!</h2>
      <button id="cut-cake">Cut the Cake</button>
    </div>
  `;
  cc.classList.add('visible');
  launchConfetti();
  setTimeout(launchConfetti, 700);
  setTimeout(launchConfetti, 1400);
  const cutBtn = cc.querySelector('#cut-cake');
  cutBtn.addEventListener('click', cutCake);
}

function cutCake() {
  const cc = document.getElementById('cake-container');
  const cakeEmoji = cc.querySelector('#cake-emoji');
  cakeEmoji.textContent = '🍰';
  cakeEmoji.style.transform = 'scale(1.2) rotate(-10deg)';
  cakeEmoji.style.transition = 'transform 0.25s ease';
  const title = cc.querySelector('#cake-title');
  if (title) title.textContent = 'Cake Served!';
  const cutBtn = cc.querySelector('#cut-cake');
  if (cutBtn) cutBtn.textContent = 'Enjoy!';
  launchConfetti();
  setTimeout(() => {
    cakeEmoji.style.transform = 'scale(1) rotate(0deg)';
  }, 300);
}

nextBtn.addEventListener('click', () => {
  nextBtn.classList.remove('visible');
  nextHint.classList.remove('visible');
  showCakeScene();
});

replayBtn.addEventListener('click', () => {
  canvas.style.pointerEvents = 'auto';
  const cc = document.getElementById('cake-container');
  cc.classList.remove('visible');
  cc.innerHTML = `<div id="cake-emoji">🎂</div><h2 id="cake-title">Make a Wish!</h2>`;
  stopTearSound();
  resetTearCount();
  clearAutoRevealTimer();
  confPieces = [];
  confCtx.clearRect(0, 0, W, H);
  resize();
});

window.addEventListener('resize', resize);

function start() {
  resize();
  loop();
}

if (clothImgReady) {
  start();
} else {
  clothImg.onload = () => { clothImgReady = true; start(); };
  setTimeout(start, 300);
}
</script>
</body>
</html>
